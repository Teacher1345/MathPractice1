<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Math Practice Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Prevent number input arrows */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    
    /* Improve touch response on mobile */
    button { touch-action: manipulation; }
    
    /* Transitions */
    .fade-enter { opacity: 0; transform: translateY(10px); }
    .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
    .hidden-view { display: none !important; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 overflow-x-hidden selection:bg-indigo-100 selection:text-indigo-900">

  <!-- ================= SETUP SCREEN ================= -->
  <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4 sm:p-6 relative transition-opacity duration-300">
    <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8 max-w-xl w-full mx-auto relative border border-slate-100">
      
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
          <i class="fa-solid fa-calculator text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-slate-800">Math Practice</h1>
        <p class="text-slate-500 mt-2">Configure your quiz and start learning</p>
      </div>

      <div class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Your Name</label>
          <input type="text" id="userName" placeholder="Enter your name" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all placeholder-slate-400">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Number of Questions</label>
          <input type="number" id="numQuestions" value="10" min="1" max="100" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Topic</label>
          <select id="categorySelect" onchange="toggleSubOptions()" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all bg-white appearance-none cursor-pointer">
            <option value="addition">Addition</option>
            <option value="subtraction">Subtraction</option>
            <option value="multiplication">Multiplication</option>
            <option value="division">Division</option>
            <option value="integers">Integers (Positives & Negatives)</option>
            <option value="decimals">Decimals</option>
            <option value="fractions">Fractions</option>
            <option value="exponents">Exponents</option>
            <option value="mixed_topics">Mixed Topics</option>
          </select>
        </div>

        <!-- Dynamic Sub-Options Container -->
        <div id="subOptionsContainer" class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
          
          <!-- Layout Option -->
          <div id="layoutOption" class="hidden">
            <label class="block text-sm font-semibold text-slate-700 mb-1">Problem Layout</label>
            <div class="flex gap-2">
              <button class="flex-1 py-2 rounded-lg border border-indigo-200 bg-indigo-50 text-indigo-700 font-medium transition-colors layout-btn active" data-val="horizontal" onclick="selectLayout(this)">Horizontal</button>
              <button class="flex-1 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors layout-btn" data-val="vertical" onclick="selectLayout(this)">Vertical</button>
            </div>
          </div>

          <!-- Digits Option (For Add/Sub) -->
          <div id="digitsOption" class="hidden">
            <label class="block text-sm font-semibold text-slate-700 mb-1">Number of Digits</label>
            <div class="flex gap-2">
              <button class="flex-1 py-2 rounded-lg border border-indigo-200 bg-indigo-50 text-indigo-700 font-medium transition-colors digit-btn active" data-val="2" onclick="selectDigit(this)">2 Digits</button>
              <button class="flex-1 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors digit-btn" data-val="3" onclick="selectDigit(this)">3 Digits</button>
              <button class="flex-1 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors digit-btn" data-val="4" onclick="selectDigit(this)">4 Digits</button>
            </div>
          </div>

          <!-- Regrouping Option (For Add/Sub) -->
          <div id="regroupingOption" class="hidden">
            <label class="block text-sm font-semibold text-slate-700 mb-1">Regrouping (Borrowing/Carrying)</label>
            <div class="flex gap-2">
              <button class="flex-1 py-2 rounded-lg border border-indigo-200 bg-indigo-50 text-indigo-700 font-medium transition-colors regroup-btn active" data-val="mixed" onclick="selectRegroup(this)">Mixed</button>
              <button class="flex-1 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors regroup-btn" data-val="without" onclick="selectRegroup(this)">Without</button>
              <button class="flex-1 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors regroup-btn" data-val="with" onclick="selectRegroup(this)">With</button>
            </div>
          </div>

          <!-- Integer Signs Option -->
          <div id="integerSignOption" class="hidden">
            <label class="block text-sm font-semibold text-slate-700 mb-1">Integer Signs</label>
            <div class="flex flex-wrap gap-2">
              <button class="flex-1 min-w-[80px] py-2 rounded-lg border border-indigo-200 bg-indigo-50 text-indigo-700 font-medium transition-colors intsign-btn active" data-val="mixed" onclick="selectIntSign(this)">Mixed</button>
              <button class="flex-1 min-w-[80px] py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors intsign-btn" data-val="both_pos" onclick="selectIntSign(this)">Pos (+)</button>
              <button class="flex-1 min-w-[80px] py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors intsign-btn" data-val="both_neg" onclick="selectIntSign(this)">Neg (-)</button>
              <button class="flex-1 min-w-[80px] py-2 rounded-lg border border-slate-200 bg-white text-slate-600 font-medium hover:bg-slate-50 transition-colors intsign-btn" data-val="diff_signs" onclick="selectIntSign(this)">Pos & Neg</button>
            </div>
          </div>

          <!-- Operation Option (For Decimals/Fractions/Integers) -->
          <div id="operationOption" class="hidden">
            <label class="block text-sm font-semibold text-slate-700 mb-1">Operation</label>
            <select id="opSelect" class="w-full px-4 py-2 rounded-lg border border-slate-200 outline-none bg-white">
              <option value="all">All Operations (+, -, ×, ÷)</option>
              <option value="addsub">Addition & Subtraction</option>
              <option value="multdiv">Multiplication & Division</option>
              <option value="add">Addition Only</option>
              <option value="sub">Subtraction Only</option>
              <option value="mult">Multiplication Only</option>
              <option value="div">Division Only</option>
            </select>
          </div>

        </div>

      </div>

      <button onclick="startQuiz()" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] flex justify-center items-center gap-2">
        <span>Start Quiz</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="mt-6 text-center">
        <button onclick="showDashboard()" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors">
          <i class="fa-solid fa-chart-line mr-1"></i> View Past Results
        </button>
      </div>
    </div>
  </div>

  <!-- ================= QUIZ SCREEN ================= -->
  <div id="quiz-screen" class="min-h-screen hidden-view flex-col p-4 sm:p-6 transition-opacity duration-300">
    <div class="max-w-2xl w-full mx-auto flex-1 flex flex-col justify-center">
      
      <!-- Top Bar -->
      <div class="flex justify-between items-center mb-8">
        <button onclick="endQuizEarly()" class="text-slate-400 hover:text-slate-600 w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-slate-200">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="bg-white px-5 py-2 rounded-full shadow-sm border border-slate-200 font-bold text-slate-700 tracking-wide">
          Question <span id="qCurrent" class="text-indigo-600">1</span> / <span id="qTotal">10</span>
        </div>
        <div class="w-10"></div> <!-- Balancer -->
      </div>

      <!-- Question Card -->
      <div class="bg-white rounded-3xl shadow-xl p-8 sm:p-12 mb-6 relative overflow-hidden border border-slate-100">
        <!-- Progress Bar -->
        <div class="absolute top-0 left-0 h-1.5 bg-indigo-100 w-full">
          <div id="progressBar" class="h-full bg-indigo-500 transition-all duration-300 w-0"></div>
        </div>

        <div class="text-center mt-4">
          <p id="questionHint" class="text-sm text-slate-400 font-medium uppercase tracking-wider mb-4 h-5"></p>
          <div id="questionText" class="text-5xl sm:text-7xl font-bold text-slate-800 tracking-tight font-mono mb-8 select-none">
            2 + 2 = ?
          </div>
          
          <form id="answerForm" onsubmit="submitAnswer(event)" class="max-w-xs mx-auto relative">
            <input type="text" id="answerInput" autocomplete="off" class="w-full text-center text-3xl sm:text-4xl font-bold px-4 py-4 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-slate-700 bg-slate-50 placeholder-slate-300" placeholder="?">
            <button type="submit" class="absolute right-2 top-2 bottom-2 aspect-square bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-colors flex items-center justify-center shadow-md">
              <i class="fa-solid fa-check"></i>
            </button>
          </form>
        </div>
      </div>

      <!-- Feedback Area -->
      <div id="feedbackArea" class="h-16 flex items-center justify-center text-xl font-bold rounded-2xl transition-all duration-300 opacity-0 transform translate-y-4">
        <!-- Injected via JS -->
      </div>

    </div>
  </div>

  <!-- ================= RESULTS SCREEN ================= -->
  <div id="results-screen" class="min-h-screen hidden-view flex-col p-4 sm:p-6 transition-opacity duration-300">
    <div class="max-w-xl w-full mx-auto my-auto bg-white rounded-3xl shadow-xl p-6 sm:p-8 border border-slate-100 text-center">
      
      <div id="resultIcon" class="w-20 h-20 mx-auto rounded-full flex items-center justify-center text-4xl mb-6 shadow-inner">
        <!-- Icon injected via JS -->
      </div>
      
      <h2 class="text-3xl font-bold text-slate-800 mb-2">Quiz Complete!</h2>
      <p id="resultMessage" class="text-slate-500 mb-8">Great effort, <span id="resName"></span>!</p>
      
      <div class="bg-slate-50 rounded-2xl p-6 mb-8 border border-slate-100">
        <p class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-1">Your Score</p>
        <div class="text-5xl font-black text-slate-800 mb-2">
          <span id="scoreFinal" class="text-indigo-600">0</span> <span class="text-2xl text-slate-400">/ <span id="scoreTotal">0</span></span>
        </div>
        <p id="scorePercent" class="font-bold text-lg text-slate-600">0%</p>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <button onclick="showSetup()" class="flex-1 bg-white border-2 border-slate-200 text-slate-700 hover:border-slate-300 hover:bg-slate-50 font-bold py-3 px-6 rounded-xl transition-all">
          <i class="fa-solid fa-gear mr-2"></i> Setup New
        </button>
        <button onclick="startQuiz()" class="flex-1 bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-200 font-bold py-3 px-6 rounded-xl transition-all">
          <i class="fa-solid fa-rotate-right mr-2"></i> Play Again
        </button>
      </div>
      
      <div class="mt-4">
        <button onclick="showDashboard()" class="w-full bg-slate-800 text-white hover:bg-slate-900 font-bold py-3 px-6 rounded-xl transition-all">
          <i class="fa-solid fa-list mr-2"></i> View Dashboard
        </button>
      </div>
    </div>
  </div>

  <!-- ================= DASHBOARD SCREEN ================= -->
  <div id="dashboard-screen" class="min-h-screen hidden-view flex-col p-4 sm:p-6 transition-opacity duration-300">
    <div class="max-w-4xl w-full mx-auto flex-1 flex flex-col">
      
      <div class="flex justify-between items-center mb-6">
        <div>
          <h2 class="text-2xl font-bold text-slate-800">Session Results</h2>
          <p class="text-slate-500 text-sm">Your scores for this session are shown below.</p>
        </div>
        <button onclick="showSetup()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-xl font-medium shadow-sm transition-all">
          <i class="fa-solid fa-arrow-left mr-2"></i> Back
        </button>
      </div>

      <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden flex-1 flex flex-col">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse min-w-[600px]">
            <thead>
              <tr class="bg-slate-50 text-slate-500 text-sm uppercase tracking-wider border-b border-slate-200">
                <th class="p-4 font-semibold w-1/4">Date & Time</th>
                <th class="p-4 font-semibold">Name</th>
                <th class="p-4 font-semibold">Category</th>
                <th class="p-4 font-semibold text-center">Score</th>
              </tr>
            </thead>
            <tbody id="dashboardBody" class="divide-y divide-slate-100">
              <!-- Rows injected via JS -->
            </tbody>
          </table>
          <div id="emptyDashboard" class="p-12 text-center text-slate-500 hidden">
            <i class="fa-solid fa-inbox text-4xl mb-3 text-slate-300"></i>
            <p>No results yet for this session.</p>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Message Box Modal (replaces alert) -->
  <div id="messageModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform" id="messageModalContent">
      <div class="text-center mb-6">
        <div class="w-12 h-12 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center mx-auto mb-4 text-xl" id="messageIcon">
          <i class="fa-solid fa-circle-info"></i>
        </div>
        <h3 class="text-lg font-bold text-slate-800" id="messageTitle">Notice</h3>
        <p class="text-slate-600 mt-2 text-sm" id="messageText">Message goes here.</p>
      </div>
      <button onclick="closeMessage()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors">
        Got it
      </button>
    </div>
  </div>

  <script>
    // --- STATE ---
    let currentQuestions = [];
    let currentQIndex = 0;
    let score = 0;
    let quizSettings = {};
    
    // In-memory array to hold results for the session
    let sessionResults = [];

    // --- SETUP UI LOGIC ---
    let selectedDigits = 2;
    let selectedRegroup = 'mixed';
    let selectedLayout = 'horizontal';
    let selectedIntSign = 'mixed';

    function init() {
      toggleSubOptions(); // Set initial state
      
      // Focus name input on load
      setTimeout(() => document.getElementById('userName').focus(), 100);
    }

    function toggleSubOptions() {
      const cat = document.getElementById('categorySelect').value;
      const opts = document.getElementById('subOptionsContainer');
      const divDigits = document.getElementById('digitsOption');
      const divRegroup = document.getElementById('regroupingOption');
      const divOp = document.getElementById('operationOption');
      const divLayout = document.getElementById('layoutOption');
      const divIntSign = document.getElementById('integerSignOption');

      // Hide all first
      divDigits.classList.add('hidden');
      divRegroup.classList.add('hidden');
      divOp.classList.add('hidden');
      divLayout.classList.add('hidden');
      divIntSign.classList.add('hidden');
      
      let hasVisibleOptions = false;

      if (cat === 'addition' || cat === 'subtraction') {
        divDigits.classList.remove('hidden');
        divRegroup.classList.remove('hidden');
        divLayout.classList.remove('hidden');
        hasVisibleOptions = true;
      } else if (cat === 'multiplication' || cat === 'division') {
        divLayout.classList.remove('hidden');
        hasVisibleOptions = true;
      } else if (cat === 'decimals') {
        divOp.classList.remove('hidden');
        divLayout.classList.remove('hidden');
        hasVisibleOptions = true;
      } else if (cat === 'integers') {
        divOp.classList.remove('hidden');
        divLayout.classList.remove('hidden');
        divIntSign.classList.remove('hidden');
        hasVisibleOptions = true;
      } else if (cat === 'fractions') {
        divOp.classList.remove('hidden');
        hasVisibleOptions = true;
      }

      if (hasVisibleOptions) {
        opts.classList.remove('hidden');
      } else {
        opts.classList.add('hidden');
      }
    }

    function selectDigit(btn) {
      document.querySelectorAll('.digit-btn').forEach(b => {
        b.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
      });
      btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
      btn.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
      selectedDigits = parseInt(btn.getAttribute('data-val'));
    }

    function selectRegroup(btn) {
      document.querySelectorAll('.regroup-btn').forEach(b => {
        b.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
      });
      btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
      btn.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
      selectedRegroup = btn.getAttribute('data-val');
    }

    function selectLayout(btn) {
      document.querySelectorAll('.layout-btn').forEach(b => {
        b.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
      });
      btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
      btn.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
      selectedLayout = btn.getAttribute('data-val');
    }

    function selectIntSign(btn) {
      document.querySelectorAll('.intsign-btn').forEach(b => {
        b.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
      });
      btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
      btn.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
      selectedIntSign = btn.getAttribute('data-val');
    }

    // --- MATH GENERATORS ---
    
    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Resolves random selections like "All Operations" into specific operations
    function resolveOp(opType) {
      if (opType === 'addsub') return Math.random() > 0.5 ? 'add' : 'sub';
      if (opType === 'multdiv') return Math.random() > 0.5 ? 'mult' : 'div';
      if (opType === 'all') {
        const ops = ['add', 'sub', 'mult', 'div'];
        return ops[Math.floor(Math.random() * ops.length)];
      }
      return opType;
    }

    // Generate Add/Sub without Regrouping helper
    function generateNoRegroup(digits, isSub) {
      let aStr = '', bStr = '';
      for(let i=0; i<digits; i++) {
        let isLead = (i === 0);
        let aDigit = randomInt(isLead ? 1 : 0, 9);
        let bDigit;
        if (isSub) {
          bDigit = randomInt(isLead ? 1 : 0, aDigit); // b <= a
        } else {
          bDigit = randomInt(isLead ? 1 : 0, 9 - aDigit); // a + b <= 9
        }
        aStr += aDigit;
        bStr += bDigit;
      }
      return { a: parseInt(aStr), b: parseInt(bStr) };
    }

    // Check if an addition requires regrouping
    function hasRegroupingAdd(a, b) {
      let aStr = a.toString(), bStr = b.toString();
      let maxLen = Math.max(aStr.length, bStr.length);
      aStr = aStr.padStart(maxLen, '0');
      bStr = bStr.padStart(maxLen, '0');
      
      let carry = 0;
      for (let i = maxLen - 1; i >= 0; i--) {
        let sum = parseInt(aStr[i]) + parseInt(bStr[i]) + carry;
        if (sum > 9) return true;
        carry = sum > 9 ? 1 : 0;
      }
      return false;
    }

    // Check if subtraction requires regrouping
    function hasRegroupingSub(a, b) {
      if (b > a) return false;
      let aStr = a.toString(), bStr = b.toString();
      bStr = bStr.padStart(aStr.length, '0');
      
      for (let i = 0; i < aStr.length; i++) {
        if (parseInt(aStr[i]) < parseInt(bStr[i])) return true;
      }
      return false;
    }

    function generateAddition(digits, regroup) {
      let a, b;
      let min = Math.pow(10, digits - 1);
      let max = Math.pow(10, digits) - 1;

      if (regroup === 'without') {
        let pair = generateNoRegroup(digits, false);
        a = pair.a; b = pair.b;
      } else if (regroup === 'with') {
        do {
          a = randomInt(min, max);
          b = randomInt(min, max);
        } while (!hasRegroupingAdd(a, b));
      } else {
        // Mixed
        a = randomInt(min, max);
        b = randomInt(min, max);
      }
      
      return {
        a: a, b: b, op: '+',
        text: `${a} + ${b}`,
        answer: (a + b).toString(),
        hint: ''
      };
    }

    function generateSubtraction(digits, regroup) {
      let a, b;
      let min = Math.pow(10, digits - 1);
      let max = Math.pow(10, digits) - 1;

      if (regroup === 'without') {
        let pair = generateNoRegroup(digits, true);
        a = pair.a; b = pair.b;
      } else if (regroup === 'with') {
        do {
          a = randomInt(min, max);
          b = randomInt(min, max);
          if (a < b) { let t = a; a = b; b = t; } // ensure a > b
        } while (!hasRegroupingSub(a, b) || a === b);
      } else {
        a = randomInt(min, max);
        b = randomInt(min, max);
        if (a < b) { let t = a; a = b; b = t; }
      }
      
      return {
        a: a, b: b, op: '-',
        text: `${a} - ${b}`,
        answer: (a - b).toString(),
        hint: ''
      };
    }

    function generateMultiplication() {
      let a = randomInt(2, 12);
      let b = randomInt(2, 12);
      return { a: a, b: b, op: '×', text: `${a} × ${b}`, answer: (a * b).toString(), hint: '' };
    }

    function generateDivision() {
      let b = randomInt(2, 12);
      let ans = randomInt(2, 12);
      let a = b * ans;
      return { a: a, b: b, op: '÷', text: `${a} ÷ ${b}`, answer: ans.toString(), hint: '' };
    }
    
    function generateInteger(opType, signMode) {
      let op = resolveOp(opType);
      let a, b, ans, sign;
      
      // Helper for explicit signs
      function getSignedInt(mode) {
        if (mode === 'pos') return randomInt(1, 15);
        if (mode === 'neg') return randomInt(-15, -1);
        let val = randomInt(-15, 15);
        return val === 0 ? randomInt(1, 15) : val; // avoid zeros for clearer sign logic
      }

      let modeA = 'mixed', modeB = 'mixed';
      if (signMode === 'both_pos') { modeA = 'pos'; modeB = 'pos'; }
      else if (signMode === 'both_neg') { modeA = 'neg'; modeB = 'neg'; }
      else if (signMode === 'diff_signs') {
        if (Math.random() > 0.5) { modeA = 'pos'; modeB = 'neg'; }
        else { modeA = 'neg'; modeB = 'pos'; }
      }
      
      if (op === 'div') {
        b = getSignedInt(modeB);
        let tempAns = getSignedInt(modeA);
        a = b * tempAns;
        ans = tempAns;
        sign = '÷';
      } else if (op === 'mult') {
        a = getSignedInt(modeA);
        b = getSignedInt(modeB);
        // keep times tables somewhat bounded for mental math
        if (a > 12) a = randomInt(1, 12);
        if (a < -12) a = randomInt(-12, -1);
        if (b > 12) b = randomInt(1, 12);
        if (b < -12) b = randomInt(-12, -1);
        ans = a * b;
        sign = '×';
      } else {
        a = getSignedInt(modeA);
        b = getSignedInt(modeB);
        ans = op === 'add' ? a + b : a - b;
        sign = op === 'add' ? '+' : '-';
      }

      // Format with explicit + signs if user isolated the signs
      let formatInt = (num) => (num > 0 && signMode !== 'mixed') ? `+${num}` : `${num}`;
      let aStr = formatInt(a);
      let bStr = b < 0 ? `(${formatInt(b)})` : formatInt(b);
      let textStr = `${aStr} ${sign} ${bStr}`;
      
      return {
        a: aStr, b: bStr, op: sign,
        text: textStr,
        answer: ans.toString(),
        hint: 'Watch your positive & negative rules! (e.g. -- is +)'
      };
    }

    function generateExponent() {
      let type = randomInt(1, 3);
      let base, exp, ans;
      if (type === 1) {
        // Squares
        base = randomInt(2, 12);
        exp = 2;
      } else if (type === 2) {
        // Cubes
        base = randomInt(2, 5);
        exp = 3;
      } else {
        // Power of 2
        base = 2;
        exp = randomInt(4, 6);
      }
      ans = Math.pow(base, exp);
      return { text: `${base}<sup>${exp}</sup>`, answer: ans.toString(), hint: '' };
    }

    function generateDecimal(opType) {
      let op = resolveOp(opType);
      let a, b, ans, textStr, sign;
      
      if (op === 'add' || op === 'sub') {
        let places1 = randomInt(1, 2);
        let places2 = randomInt(1, 2);
        
        a = parseFloat((Math.random() * 50 + 1).toFixed(places1));
        b = parseFloat((Math.random() * 50 + 1).toFixed(places2));
        
        if (op === 'sub' && a < b) { let t = a; a = b; b = t; }
        
        if (op === 'add') {
          ans = (a + b).toFixed(Math.max(places1, places2));
        } else {
          ans = (a - b).toFixed(Math.max(places1, places2));
        }
        sign = op === 'add' ? '+' : '-';
      } else if (op === 'mult') {
        a = parseFloat((Math.random() * 10 + 0.1).toFixed(1));
        b = parseFloat((Math.random() * 10 + 0.1).toFixed(1));
        ans = (a * b).toFixed(2);
        sign = '×';
      } else if (op === 'div') {
        let expectedAns = parseFloat((Math.random() * 20 + 0.1).toFixed(1));
        b = parseFloat((Math.random() * 9 + 0.1).toFixed(1)); 
        a = Number((expectedAns * b).toFixed(2));
        ans = expectedAns.toFixed(1);
        sign = '÷';
      }
      
      textStr = `${a} ${sign} ${b}`;
      ans = Number(ans).toString(); // Safely strip floating zero fluff
      
      return { a: a, b: b, op: sign, text: textStr, answer: ans, hint: 'Use a decimal point (.)' };
    }

    function generateFraction(opType) {
      let op = resolveOp(opType);
      let denoms = [2, 3, 4, 5, 6, 8, 10];
      
      let n1, d1, n2, d2, ansNum, ansDenom, sign;
      
      if (op === 'add' || op === 'sub') {
        d1 = denoms[randomInt(0, denoms.length - 1)];
        d2 = d1; // Keeping same denom for foundational practice
        n1 = randomInt(1, d1 - 1);
        n2 = randomInt(1, d2 - 1);
        
        if (op === 'sub' && n1 < n2) { let t = n1; n1 = n2; n2 = t; }
        
        ansNum = op === 'add' ? (n1 + n2) : (n1 - n2);
        ansDenom = d1;
        sign = op === 'add' ? '+' : '-';
      } else {
        d1 = denoms[randomInt(0, denoms.length - 1)];
        d2 = denoms[randomInt(0, denoms.length - 1)];
        n1 = randomInt(1, d1 - 1);
        n2 = randomInt(1, d2 - 1);
        
        if (op === 'mult') {
          ansNum = n1 * n2;
          ansDenom = d1 * d2;
          sign = '×';
        } else { // div
          ansNum = n1 * d2;
          ansDenom = d1 * n2;
          sign = '÷';
        }
      }
      
      // Simplification logic
      function gcd(a, b) {
        a = Math.abs(a);
        b = Math.abs(b);
        return b === 0 ? a : gcd(b, a % b);
      }
      
      let divisor = gcd(ansNum, ansDenom);
      let simpNum = ansNum / divisor;
      let simpDenom = ansDenom / divisor;
      
      // Keep denominator positive visually
      if (simpDenom < 0) {
        simpNum = -simpNum;
        simpDenom = -simpDenom;
      }
      
      let ansStr = simpDenom === 1 ? `${simpNum}` : `${simpNum}/${simpDenom}`;
      if (ansNum === 0) ansStr = "0";

      return {
        text: `${n1}/${d1} ${sign} ${n2}/${d2}`,
        answer: ansStr,
        hint: 'Format: a/b (Simplify your answer)'
      };
    }

    function buildQuiz() {
      const cat = document.getElementById('categorySelect').value;
      const total = parseInt(document.getElementById('numQuestions').value) || 10;
      const opSub = document.getElementById('opSelect').value;
      
      quizSettings = { category: cat, total: total, digits: selectedDigits, regroup: selectedRegroup, op: opSub, layout: selectedLayout, intSign: selectedIntSign };
      currentQuestions = [];

      for(let i=0; i<total; i++) {
        let currentCat = cat;
        if (cat === 'mixed_topics') {
          const cats = ['addition', 'subtraction', 'multiplication', 'division', 'integers', 'decimals', 'fractions', 'exponents'];
          currentCat = cats[Math.floor(Math.random() * cats.length)];
        }

        if (currentCat === 'addition') currentQuestions.push(generateAddition(cat==='mixed_topics'? randomInt(2,3) : selectedDigits, cat==='mixed_topics'? 'mixed' : selectedRegroup));
        else if (currentCat === 'subtraction') currentQuestions.push(generateSubtraction(cat==='mixed_topics'? randomInt(2,3) : selectedDigits, cat==='mixed_topics'? 'mixed' : selectedRegroup));
        else if (currentCat === 'multiplication') currentQuestions.push(generateMultiplication());
        else if (currentCat === 'division') currentQuestions.push(generateDivision());
        else if (currentCat === 'integers') currentQuestions.push(generateInteger(cat==='mixed_topics'? 'all' : opSub, cat==='mixed_topics'? 'mixed' : selectedIntSign));
        else if (currentCat === 'exponents') currentQuestions.push(generateExponent());
        else if (currentCat === 'decimals') currentQuestions.push(generateDecimal(cat==='mixed_topics'? 'all' : opSub));
        else if (currentCat === 'fractions') currentQuestions.push(generateFraction(cat==='mixed_topics'? 'all' : opSub));
      }
    }

    // --- QUIZ FLOW LOGIC ---

    function startQuiz() {
      const name = document.getElementById('userName').value.trim();
      const numQ = parseInt(document.getElementById('numQuestions').value);
      
      if (!name) {
        showMessage('Required', 'Please enter your name to start.', 'fa-user');
        return;
      }
      if (isNaN(numQ) || numQ < 1 || numQ > 100) {
        showMessage('Invalid Input', 'Questions must be between 1 and 100.', 'fa-list-ol');
        return;
      }

      buildQuiz();
      currentQIndex = 0;
      score = 0;
      
      switchView('quiz-screen');
      renderQuestion();
    }

    function renderQuestion() {
      const q = currentQuestions[currentQIndex];
      document.getElementById('qCurrent').innerText = currentQIndex + 1;
      document.getElementById('qTotal').innerText = quizSettings.total;
      
      const prog = ((currentQIndex) / quizSettings.total) * 100;
      document.getElementById('progressBar').style.width = prog + '%';
      
      const qText = document.getElementById('questionText');
      if (quizSettings.layout === 'vertical' && q.op) {
        qText.innerHTML = `
          <div class="inline-flex flex-col items-end leading-none py-2">
            <div>${q.a}</div>
            <div class="flex justify-between w-full border-b-[4px] border-slate-800 pt-2 pb-2 mb-2 gap-8">
              <span class="text-slate-400">${q.op}</span>
              <span>${q.b}</span>
            </div>
          </div>
        `;
      } else {
        qText.innerHTML = q.text + ' = ?';
      }

      document.getElementById('questionHint').innerText = q.hint;
      
      const inp = document.getElementById('answerInput');
      inp.value = '';
      inp.disabled = false;
      inp.focus();

      const fb = document.getElementById('feedbackArea');
      fb.className = "h-16 flex items-center justify-center text-xl font-bold rounded-2xl transition-all duration-300 opacity-0 transform translate-y-4";
      fb.innerHTML = "";
    }

    function submitAnswer(e) {
      e.preventDefault();
      const inp = document.getElementById('answerInput');
      if (inp.disabled) return; // Prevent double submit
      
      let userAns = inp.value.trim().replace(/\s/g, ''); // strip spaces
      if (!userAns && userAns !== "0") return;

      // Allow users to type '+5' instead of just '5'
      if (userAns.startsWith('+')) userAns = userAns.substring(1);

      const q = currentQuestions[currentQIndex];
      let isCorrect = false;

      // Handle fractions equivalence (basic safety check)
      if (q.text.includes('/') && userAns.includes('/')) {
         isCorrect = (userAns === q.answer);
      } else if (q.text.includes('.')) {
         // Allow things like .5 vs 0.5
         isCorrect = parseFloat(userAns) === parseFloat(q.answer);
      } else {
         isCorrect = (userAns === q.answer);
      }

      inp.disabled = true;
      showFeedback(isCorrect, q.answer);

      if (isCorrect) score++;

      setTimeout(() => {
        currentQIndex++;
        if (currentQIndex < quizSettings.total) {
          renderQuestion();
        } else {
          finishQuiz();
        }
      }, 1500);
    }

    function showFeedback(isCorrect, correctAns) {
      const fb = document.getElementById('feedbackArea');
      fb.classList.remove('opacity-0', 'translate-y-4');
      
      if (isCorrect) {
        fb.classList.add('bg-green-100', 'text-green-700', 'opacity-100', 'translate-y-0');
        fb.classList.remove('bg-red-100', 'text-red-700');
        fb.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> Correct!';
      } else {
        fb.classList.add('bg-red-100', 'text-red-700', 'opacity-100', 'translate-y-0');
        fb.classList.remove('bg-green-100', 'text-green-700');
        fb.innerHTML = `<i class="fa-solid fa-circle-xmark mr-2"></i> Incorrect. Answer: ${correctAns}`;
      }
    }

    function finishQuiz() {
      const name = document.getElementById('userName').value.trim();
      document.getElementById('progressBar').style.width = '100%';
      
      document.getElementById('resName').innerText = name;
      document.getElementById('scoreFinal').innerText = score;
      document.getElementById('scoreTotal').innerText = quizSettings.total;
      
      const pct = Math.round((score / quizSettings.total) * 100);
      document.getElementById('scorePercent').innerText = `${pct}% Accuracy`;

      const icon = document.getElementById('resultIcon');
      if (pct >= 90) {
        icon.className = "w-20 h-20 mx-auto rounded-full flex items-center justify-center text-4xl mb-6 shadow-inner bg-yellow-100 text-yellow-500";
        icon.innerHTML = '<i class="fa-solid fa-trophy"></i>';
      } else if (pct >= 70) {
        icon.className = "w-20 h-20 mx-auto rounded-full flex items-center justify-center text-4xl mb-6 shadow-inner bg-green-100 text-green-500";
        icon.innerHTML = '<i class="fa-solid fa-star"></i>';
      } else {
        icon.className = "w-20 h-20 mx-auto rounded-full flex items-center justify-center text-4xl mb-6 shadow-inner bg-blue-100 text-blue-500";
        icon.innerHTML = '<i class="fa-solid fa-thumbs-up"></i>';
      }

      // Format details for saving
      let details = "";
      if (quizSettings.category === 'mixed_topics') {
        details = "Combination of all operations";
      } else if (quizSettings.category === 'addition' || quizSettings.category === 'subtraction') {
        details = `${quizSettings.digits} Digits, ${quizSettings.regroup} regroup, ${quizSettings.layout}`;
      } else if (quizSettings.category === 'integers') {
        details = `Op: ${quizSettings.op}, Signs: ${quizSettings.intSign}, ${quizSettings.layout}`;
      } else if (quizSettings.category === 'decimals') {
        details = `Op: ${quizSettings.op}, ${quizSettings.layout}`;
      } else if (quizSettings.category === 'fractions') {
        details = `Op: ${quizSettings.op}`;
      } else if (quizSettings.category === 'exponents') {
        details = 'Standard';
      } else {
        details = `${quizSettings.layout} layout`;
      }

      // Save Data
      const record = {
        date: new Date().toISOString(),
        userName: name,
        category: quizSettings.category,
        settings: details || 'Standard',
        score: score,
        total: quizSettings.total
      };
      
      sessionResults.unshift(record); // Add to local session array

      // Attempt to save to Apps Script backend if deployed
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(() => console.log('Saved to sheet'))
          .withFailureHandler((e) => console.error('Error saving to sheet', e))
          .saveResults(record);
      }

      switchView('results-screen');
    }

    function endQuizEarly() {
      // Custom confirm replacement
      const modal = document.getElementById('messageModal');
      const content = document.getElementById('messageModalContent');
      document.getElementById('messageIcon').innerHTML = '<i class="fa-solid fa-circle-exclamation text-yellow-500"></i>';
      document.getElementById('messageTitle').innerText = 'End Quiz?';
      document.getElementById('messageText').innerText = 'Are you sure you want to end this quiz early? Your progress will be lost.';
      
      // Mutate button temporarily for confirm action
      const btn = content.querySelector('button');
      const oldClick = btn.onclick;
      const oldText = btn.innerText;
      
      btn.innerText = 'Yes, End Quiz';
      btn.className = 'w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-colors mt-2';
      
      // Add cancel button
      const cancelBtn = document.createElement('button');
      cancelBtn.innerText = 'Cancel';
      cancelBtn.className = 'w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-colors mt-2';
      cancelBtn.onclick = () => {
        closeMessage();
        btn.onclick = oldClick;
        btn.innerText = oldText;
        btn.className = 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors';
        cancelBtn.remove();
      };
      content.appendChild(cancelBtn);

      btn.onclick = () => {
        closeMessage();
        btn.onclick = oldClick;
        btn.innerText = oldText;
        btn.className = 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors';
        cancelBtn.remove();
        showSetup();
      };

      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');
      }, 10);
    }

    // --- NAVIGATION & UTILS ---

    function switchView(viewId) {
      const views = ['setup-screen', 'quiz-screen', 'results-screen', 'dashboard-screen'];
      views.forEach(v => {
        const el = document.getElementById(v);
        if (v === viewId) {
          el.classList.remove('hidden-view');
          // small delay to trigger animation
          setTimeout(() => el.style.opacity = '1', 10);
        } else {
          el.classList.add('hidden-view');
          el.style.opacity = '0';
        }
      });
    }

    function showSetup() { switchView('setup-screen'); }

    function showDashboard() {
      renderDashboard();
      switchView('dashboard-screen');
    }

    function renderDashboard() {
      const tbody = document.getElementById('dashboardBody');
      const empty = document.getElementById('emptyDashboard');
      
      tbody.innerHTML = '';
      
      if (sessionResults.length === 0) {
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        sessionResults.forEach(r => {
          const pct = Math.round((r.score / r.total) * 100);
          let color = 'bg-blue-100 text-blue-700';
          if (pct >= 90) color = 'bg-yellow-100 text-yellow-700';
          else if (pct >= 70) color = 'bg-green-100 text-green-700';
          else if (pct < 50) color = 'bg-red-100 text-red-700';

          const dateStr = new Date(r.date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

          const tr = document.createElement('tr');
          tr.className = "hover:bg-slate-50 transition-colors";
          tr.innerHTML = `
            <td class="p-4 text-sm text-slate-500">${dateStr}</td>
            <td class="p-4 font-semibold text-slate-800">${r.userName}</td>
            <td class="p-4">
              <div class="text-sm font-medium text-slate-800 capitalize">${r.category}</div>
              <div class="text-xs text-slate-500">${r.settings}</div>
            </td>
            <td class="p-4 text-center">
              <span class="px-3 py-1 rounded-full text-xs font-bold ${color}">
                ${r.score} / ${r.total} (${pct}%)
              </span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }
    }

    function showMessage(title, text, iconClass = 'fa-circle-info') {
      const modal = document.getElementById('messageModal');
      const content = document.getElementById('messageModalContent');
      document.getElementById('messageTitle').innerText = title;
      document.getElementById('messageText').innerText = text;
      document.getElementById('messageIcon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
      
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');
      }, 10);
    }

    function closeMessage() {
      const modal = document.getElementById('messageModal');
      const content = document.getElementById('messageModalContent');
      
      modal.classList.add('opacity-0');
      content.classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 300);
    }

    // Initialize
    window.onload = init;
  </script>
